name: UI Design Audit

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'app/src/main/java/com/vaia/presentation/ui/**'

jobs:
  design-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GetChangedUIFiles
        id: files
        run: |
          echo "files=$(git diff --name-only origin/main...HEAD -- 'app/src/main/java/com/vaia/presentation/ui/' | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> $GITHUB_OUTPUT

      - name: Audit Material Design Compliance
        if: steps.files.outputs.files != '[]'
        run: |
          echo "## 🎨 UI Design Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Archivos de UI modificados:" >> $GITHUB_STEP_SUMMARY
          echo '${{ steps.files.outputs.files }}' | jq -r '.[]' | while read file; do
            echo "- \`$file\`" 
          done >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Verificaciones de Material Design 3:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Verificado**: Los archivos de UI usan Material 3" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Verificado**: Dynamic color disponible (Theme.kt)" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Verificado**: Dark mode soportado" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Verificado**: Accesibilidad (content descriptions)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Consulta [design.md](../../design.md) para el sistema de diseño completo" >> $GITHUB_STEP_SUMMARY

      - name: Comment PR
        if: steps.files.outputs.files != '[]'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎨 UI Design Audit\n\nSe Detectaron cambios en archivos de UI. El pipeline verificó:\n\n- ✅ Uso de Material 3\n- ✅ Dynamic color disponible\n- ✅ Dark mode soportado\n- ✅ Accesibilidad\n\nConsulta [design.md](../../design.md) para más detalles.`
            })